<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <title>Login - Digital Attendance</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fas fa-clipboard-check"></i></div>
            </div>
            <h1>Digital Attendance</h1>
            <p class="auth-subtitle">Sign in with the account created by your admin.</p>

            <div id="message" class="msg-box"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" value="yordanos">
                </div>
                <div class="form-group">
                    <label>
                        <span class="field-heading">
                            Password
                            <button type="button" class="inline-text-button" onclick="togglePassword()" id="togglePasswordBtn">Show</button>
                        </span>
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" placeholder="Enter your password" value="123">
                        <button type="button" class="icon-button" onclick="togglePassword()" aria-label="Toggle password">
                            <i class="fas fa-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="button" class="btn-auth" id="loginBtn">
                    <i class="fas fa-lock"></i>
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginBtnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Signing in...</span>
                </button>
            </form>

            <div class="auth-info-box">
                <div class="info-label">Demo Credentials</div>
                <div class="info-row"><span><span class="role-tag">Admin</span> admin</span><span>Pass: 123</span></div>
                <div class="info-row"><span><span class="role-tag">Teacher</span> yordanos</span><span>Pass: 123</span></div>
                <div class="info-row"><span><span class="role-tag">Student</span> abdi_misgana</span><span>Pass: 123</span></div>
                <div class="info-note">All seeded students use password 123</div>
            </div>

            <div class="auth-link">
                New user? Contact admin for registration
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://' + window.location.hostname + ':5001/api';

        const pagesByRole = {
            admin: 'adminhome.html',
            teacher: 'teacherhome.html',
            student: 'studenthome.html'
        };

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            const toggleBtn = document.getElementById('togglePasswordBtn');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
                toggleBtn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye';
                toggleBtn.textContent = 'Show';
            }
        }

        async function handleLogin(event) {
            if (event) event.preventDefault();

            const message = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginBtnSpinner = document.getElementById('loginBtnSpinner');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            message.className = 'msg-box';
            message.textContent = '';

            if (!username || !password) {
                message.textContent = 'Please enter both username and password';
                message.className = 'msg-box error show';
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.style.display = 'none';
            loginBtnSpinner.style.display = 'inline';
            localStorage.removeItem('token');
            localStorage.removeItem('user');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (jsonError) {
                    throw new Error(
                        `Server returned: ${response.status} ${response.statusText}\n` +
                        `URL: ${API_URL}/auth/login`
                    );
                }

                if (!response.ok || !data.success || !data.token || !data.user) {
                    throw new Error(data.message || `Login failed (${response.status})`);
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                message.textContent = 'Welcome ' + data.user.full_name + '! Redirecting...';
                message.className = 'msg-box success show';

                setTimeout(() => {
                    window.location.href = pagesByRole[data.user.role] || 'login.html';
                }, 700);
            } catch (error) {
                message.textContent = error.message.includes('Failed to fetch')
                    ? 'Failed to connect to backend. Make sure the server is running on port 5001.'
                    : error.message;
                message.className = 'msg-box error show';
                loginBtn.disabled = false;
                loginBtnText.style.display = 'inline';
                loginBtnSpinner.style.display = 'none';
                console.error('Login error:', error);
            }
        }

        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        document.getElementById('username').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
