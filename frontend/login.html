<!DOCTYPE html>
<html>
<head>
    <title>Login - Digital Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 { color: white; text-align: center; }
        h1 span { color: #4F46E5; }
        .subtitle { color: #9CA3AF; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { color: #9CA3AF; display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #374151;
            border-radius: 8px;
            background: #0f0f23;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
        .btn {
            width: 100%;
            padding: 14px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: #6366F1; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.error { color: #EF4444; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
        .message.success { color: #22C55E; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }
        .message.show { display: block; }
        .demo-box {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #374151;
        }
        .demo-box p { color: #9CA3AF; font-size: 12px; margin: 0 0 5px 0; }
        .demo-box .row { display: flex; justify-content: space-between; color: #9CA3AF; font-size: 13px; padding: 2px 0; }
        .demo-box .row strong { color: white; }
        .demo-box .row .role { color: #4F46E5; }
        .register-link { text-align: center; color: #9CA3AF; margin-top: 20px; }
        .register-link a { color: #4F46E5; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Digital <span>Attendance</span></h1>
        <p class="subtitle">Sign in to your account</p>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" value="teacher1" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" value="123" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>

        <div class="demo-box">
            <p>🔑 Demo Credentials</p>
            <div class="row"><span><span class="role">Admin</span> <strong>admin</strong></span><span>Pass: <strong>123</strong></span></div>
            <div class="row"><span><span class="role">Teacher</span> <strong>teacher1</strong></span><span>Pass: <strong>123</strong></span></div>
            <div class="row"><span><span class="role">Student</span> <strong>student1</strong></span><span>Pass: <strong>123</strong></span></div>
        </div>

        <div class="register-link">
            Don't have an account? <a href="/register.html">Register here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const message = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            message.className = 'message';
            message.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                message.textContent = 'Please enter both username and password';
                message.className = 'message error show';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    message.textContent = '✅ Welcome ' + data.user.full_name + '! Redirecting...';
                    message.className = 'message success show';
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        const role = data.user.role;
                        if (role === 'admin') {
                            window.location.href = '/adminhome.html';
                        } else if (role === 'teacher') {
                            window.location.href = '/teacherhome.html';
                        } else if (role === 'student') {
                            window.location.href = '/studenthome.html';
                        } else {
                            window.location.href = '/login.html';
                        }
                    }, 1500);
                } else {
                    message.textContent = '❌ ' + data.message;
                    message.className = 'message error show';
                }
            } catch (error) {
                message.textContent = '❌ Failed to connect to server. Make sure the server is running.';
                message.className = 'message error show';
                console.error('Error:', error);
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        });
    </script>
</body>
</html>
