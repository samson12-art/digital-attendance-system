<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Digital Attendance</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fas fa-clipboard-check"></i></div>
            </div>
            <h1>Digital Attendance</h1>
            <p class="auth-subtitle">Reset your password.</p>

            <div id="message" class="msg-box"></div>

            <!-- Step 1: Verify Identity -->
            <div id="step1" class="auth-form" style="display:block;">
                <p style="color: var(--muted); font-size: 14px; line-height: 1.55; text-align: center; margin-bottom: 4px;">Enter your username and registered email to verify your identity.</p>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your registered email">
                </div>
                <button type="button" class="btn-auth" id="verifyBtn">
                    <i class="fas fa-check-circle"></i>
                    <span id="verifyBtnText">Verify Identity</span>
                    <span id="verifyBtnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Verifying...</span>
                </button>
            </div>

            <!-- Step 2: Reset Password -->
            <div id="step2" class="auth-form" style="display:none;">
                <p style="color: var(--muted); font-size: 14px; line-height: 1.55; text-align: center; margin-bottom: 4px;">Choose a new password (at least 3 characters).</p>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
                <button type="button" class="btn-auth" id="resetBtn">
                    <i class="fas fa-save"></i>
                    <span id="resetBtnText">Reset Password</span>
                    <span id="resetBtnSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Resetting...</span>
                </button>
            </div>

            <div class="auth-link" style="margin-top: 16px;">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://' + window.location.hostname + ':5001/api';
        let resetToken = '';

        function showMessage(el, text, type) {
            el.textContent = text;
            el.className = 'msg-box ' + type + ' show';
        }

        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const message = document.getElementById('message');
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('verifyBtn');
            const btnText = document.getElementById('verifyBtnText');
            const btnSpinner = document.getElementById('verifyBtnSpinner');

            if (!username || !email) {
                showMessage(message, 'Please enter both username and email', 'error');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline';

            try {
                const res = await fetch(API_URL + '/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                const data = await res.json();

                if (data.success && data.token) {
                    resetToken = data.token;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    message.className = 'msg-box';
                    message.textContent = '';
                } else {
                    showMessage(message, data.message || 'Verification failed', 'error');
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnSpinner.style.display = 'none';
                }
            } catch (error) {
                showMessage(message, 'Connection error. Make sure the server is running.', 'error');
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const message = document.getElementById('message');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('resetBtnText');
            const btnSpinner = document.getElementById('resetBtnSpinner');

            if (!newPassword || !confirmPassword) {
                showMessage(message, 'Please enter and confirm your new password', 'error');
                return;
            }

            if (newPassword.length < 3) {
                showMessage(message, 'Password must be at least 3 characters', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage(message, 'Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline';

            try {
                const res = await fetch(API_URL + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage(message, 'Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    showMessage(message, data.message || 'Reset failed', 'error');
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnSpinner.style.display = 'none';
                }
            } catch (error) {
                showMessage(message, 'Connection error. Make sure the server is running.', 'error');
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
