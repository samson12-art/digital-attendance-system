<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Digital Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0a0a1a; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem; 
        }
        .register-card { 
            background: rgba(255,255,255,0.04); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 24px; 
            padding: 2rem; 
            width: 100%; 
            max-width: 480px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); 
        }
        .register-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: #fff; 
            text-align: center; 
        }
        .register-title span { color: #818CF8; }
        .register-subtitle { 
            color: rgba(255,255,255,0.4); 
            font-size: 0.85rem; 
            text-align: center; 
            margin-top: 0.25rem; 
        }
        .input-group { margin-bottom: 1rem; }
        .input-group label { 
            display: block; 
            color: rgba(255,255,255,0.6); 
            font-size: 0.7rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 0.3rem; 
        }
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 0.7rem 1rem; 
            background: rgba(255,255,255,0.05); 
            border: 1.5px solid rgba(255,255,255,0.08); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 0.95rem; 
            outline: none; 
            transition: all 0.3s; 
        }
        .input-group input:focus, .input-group select:focus { 
            border-color: #4F46E5; 
            box-shadow: 0 0 0 4px rgba(79,70,229,0.1); 
        }
        .input-group select option { background: #1a1a2e; color: #fff; }
        .register-btn { 
            width: 100%; 
            padding: 0.8rem; 
            background: linear-gradient(135deg, #4F46E5, #4338CA); 
            border: none; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .register-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 30px rgba(79,70,229,0.35); 
        }
        .register-btn:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none !important; 
        }
        .error-msg { 
            display: none; 
            background: rgba(239,68,68,0.12); 
            border: 1px solid rgba(239,68,68,0.25); 
            border-radius: 12px; 
            padding: 0.7rem 1rem; 
            color: #FCA5A5; 
            font-size: 0.85rem; 
            margin-bottom: 1rem; 
        }
        .error-msg.show { display: block; }
        .success-msg { 
            display: none; 
            background: rgba(34,197,94,0.12); 
            border: 1px solid rgba(34,197,94,0.25); 
            border-radius: 12px; 
            padding: 0.7rem 1rem; 
            color: #22C55E; 
            font-size: 0.85rem; 
            margin-bottom: 1rem; 
        }
        .success-msg.show { display: block; }
        .login-link { 
            text-align: center; 
            margin-top: 1rem; 
            color: rgba(255,255,255,0.4); 
            font-size: 0.85rem; 
        }
        .login-link a { 
            color: #818CF8; 
            text-decoration: none; 
            font-weight: 600; 
        }
        .login-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .register-card { padding: 1.5rem; } }
    </style>
</head>
<body>

<div class="register-card">
    <div style="text-align:center; margin-bottom: 1.5rem;">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">📚</div>
        <h1 class="register-title">Create <span>Account</span></h1>
        <p class="register-subtitle">Register as Student or Teacher</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">✅ Registration successful! Please login.</div>

    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" required minlength="3">
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        </div>
        <div class="input-group">
            <label>Register as</label>
            <select id="role" required>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
        </div>
        <button type="submit" class="register-btn" id="registerBtn">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

<script>
async function handleRegister(event) {
    event.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const role = document.getElementById('role').value;
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const registerBtn = document.getElementById('registerBtn');

    // Reset messages
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');
    errorMsg.textContent = '';

    // Validation
    if (!fullName || !username || !email || !password || !confirmPassword) {
        errorMsg.textContent = 'All fields are required';
        errorMsg.classList.add('show');
        return;
    }

    if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.classList.add('show');
        return;
    }

    if (password.length < 3) {
        errorMsg.textContent = 'Password must be at least 3 characters';
        errorMsg.classList.add('show');
        return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = 'Registering...';

    try {
        const API_URL = 'http://localhost:5001/api';
        const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username,
                password,
                email,
                full_name: fullName,
                role
            })
        });

        const data = await response.json().catch(() => ({
            success: false,
            message: 'Server returned an invalid response'
        }));

        if (!response.ok || !data.success) {
            throw new Error(data.message || 'Registration failed');
        }

        successMsg.textContent = '✅ Registration successful! Redirecting to login...';
        successMsg.classList.add('show');

        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);

    } catch (error) {
        errorMsg.textContent = error.message || 'Registration failed. Please try again.';
        errorMsg.classList.add('show');
        registerBtn.disabled = false;
        registerBtn.textContent = 'Register';
    }
}

// Clear error on input
document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => {
        document.getElementById('errorMsg').classList.remove('show');
    });
});
</script>

</body>
</html>
