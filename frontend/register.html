<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Digital Attendance</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
            </div>
            <h1>Registration Restricted</h1>
            <p class="auth-subtitle">Only administrators can create new accounts.</p>

            <div style="text-align:center; padding: 24px 16px; background: var(--surface-input); border-radius: var(--radius); border: 1px solid var(--border); margin-top: 24px;">
                <div style="font-size: 36px; margin-bottom: 16px; color: var(--accent); display:inline-block;">
                    <i class="fas fa-user-shield"></i>
                </div>
                <p style="color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 20px;">
                    Self-registration is disabled for security purposes.<br>
                    Please contact an administrator to create your account.
                </p>
                <a href="login.html" style="display:inline-flex;align-items:center;gap:8px;padding:0 16px;min-height:44px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:800;cursor:pointer;text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>

            <div class="auth-link" style="margin-top: 20px;">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
        </div>
    </div>
</body>
</html>
